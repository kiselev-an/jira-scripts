#from https://about.gitlab.com/blog/build-a-new-website-in-a-few-easy-steps-with-gitlab-pages/
# The Docker image that will be used to build your app
image: openjdk:8
# Functions that should be executed before the build script is run
before_script: []
pages:
  stage: deploy
  script:
    #- ./gradlew bundle
    - echo "Deploying application:"
    - echo "1. Make temp dir '.public' ..."
    - mkdir .public
    - echo "2. Copies all website files into temp dir ('.public') ..."
    - cp -r * .public
    - echo "3. Renames temp dir ('.public') into 'public' ..."
    - mv .public public
    - echo "Application successfully deployed."
  artifacts: # необходимый артефакт
    paths:
      # The folder that contains the files to be exposed at the Page URL
      - public
  only: # собирать только из ветки мастера
    - main